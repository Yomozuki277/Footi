<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>footi</title>
  <meta name="description" content="footi｜测测你是哪种脚" />
  <style>
    :root{
      --bg:#f7f2e8;
      --bg-soft:#efe7da;
      --panel:rgba(255,255,255,.86);
      --panel-strong:rgba(255,255,255,.96);
      --text:#171614;
      --muted:#7b7268;
      --line:rgba(23,22,20,.10);
      --line-strong:rgba(23,22,20,.18);
      --accent:#815f3d;
      --accent-soft:rgba(129,95,61,.12);
      --shadow:0 18px 46px rgba(23,22,20,.08);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --safe-bottom:max(16px, env(safe-area-inset-bottom));
      --transition:220ms ease;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;min-height:100%;}
    body{
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 14% 12%, rgba(255,255,255,.92), transparent 22%),
        radial-gradient(circle at 84% 18%, rgba(129,95,61,.08), transparent 17%),
        radial-gradient(circle at 60% 90%, rgba(255,255,255,.68), transparent 23%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
      background-image:
        linear-gradient(rgba(23,22,20,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23,22,20,.028) 1px, transparent 1px);
      background-size:30px 30px;
      mask-image:linear-gradient(180deg, rgba(0,0,0,.6), transparent 84%);
      opacity:.34;
    }
    button{font:inherit;}
    .app{width:min(100%, 560px);margin:0 auto;padding:16px 14px calc(110px + var(--safe-bottom));}
    .topbar{
      position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px 2px 16px;background:linear-gradient(180deg, rgba(247,242,232,.95), rgba(247,242,232,.8), transparent);
      backdrop-filter:blur(8px);
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.1em;text-transform:lowercase;}
    .brand-mark{width:40px;height:40px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.82);display:grid;place-items:center;box-shadow:var(--shadow);}
    .brand-mark svg{width:22px;height:22px;}
    .tiny{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
    .progress-chip{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid var(--line);font-size:12px;color:var(--muted);box-shadow:var(--shadow);}
    .view{display:none;animation:fade .24s ease;}
    .view.active{display:block;}
    @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .card{
      border:1px solid var(--line);border-radius:var(--radius-xl);background:linear-gradient(180deg, var(--panel-strong), var(--panel));
      box-shadow:var(--shadow);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    }
    .question-card{padding:22px 18px 18px;overflow:hidden;position:relative;}
    .question-card::after{
      content:"";position:absolute;right:-18px;top:-22px;width:110px;height:110px;border-radius:999px;
      background:radial-gradient(circle, rgba(129,95,61,.12), transparent 65%);
    }
    .hero-mark{width:72px;height:72px;border-radius:24px;border:1px solid var(--line);background:rgba(255,255,255,.72);display:grid;place-items:center;margin-bottom:16px;}
    .hero-mark svg{width:40px;height:40px;}
    h1,h2,h3,p{margin:0;}
    .question-no{font-size:12px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}
    .question-text{font-size:26px;line-height:1.28;font-weight:800;letter-spacing:-.04em;max-width:15em;}
    .helper{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.7;}
    .progress-line{height:8px;border-radius:999px;background:rgba(23,22,20,.07);overflow:hidden;margin:18px 0 20px;}
    .progress-fill{height:100%;width:0;background:linear-gradient(90deg, var(--accent), #ba9871);border-radius:inherit;transition:width .3s ease;}
    .options{display:grid;gap:12px;}
    .option{
      width:100%;text-align:left;padding:16px 16px 16px 14px;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.76);
      display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition),background var(--transition);
      min-height:68px;
    }
    .option:hover{transform:translateY(-1px);border-color:var(--line-strong);box-shadow:0 10px 24px rgba(23,22,20,.06);}
    .option.active{background:var(--accent-soft);border-color:rgba(129,95,61,.32);}
    .option-key{width:32px;height:32px;border-radius:999px;background:rgba(23,22,20,.06);display:grid;place-items:center;font-weight:800;font-size:13px;flex:0 0 auto;}
    .option.active .option-key{background:rgba(129,95,61,.16);color:#60472f;}
    .option-text{font-size:15px;line-height:1.65;}
    .bottom-bar{
      position:fixed;left:0;right:0;bottom:0;z-index:20;padding:12px 14px calc(12px + var(--safe-bottom));
      background:linear-gradient(180deg, rgba(247,242,232,0), rgba(247,242,232,.92) 26%, rgba(247,242,232,.98));
      backdrop-filter:blur(10px);
    }
    .bottom-wrap{width:min(100%, 560px);margin:0 auto;display:flex;gap:12px;}
    .btn{
      appearance:none;border:1px solid var(--line);border-radius:999px;padding:14px 18px;min-height:52px;cursor:pointer;
      transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition),background var(--transition),opacity var(--transition);
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(23,22,20,.06);border-color:var(--line-strong);}
    .btn:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none;}
    .btn.secondary{background:rgba(255,255,255,.76);color:var(--text);flex:0 0 112px;}
    .btn.primary{background:var(--text);color:#fbf8f3;border-color:rgba(23,22,20,.92);flex:1;}
    .btn.accent{background:var(--accent);color:#fbf8f3;border-color:var(--accent);}
    .result-card,.compat-card{padding:20px 18px;}
    .result-head,.compat-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:rgba(129,95,61,.12);color:#6a4d30;font-size:12px;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(129,95,61,.16);}
    .result-name,.compat-name{font-size:34px;line-height:1;font-weight:850;letter-spacing:-.05em;margin-top:12px;}
    .share-line{margin-top:10px;font-size:16px;color:#5f4a34;font-weight:700;}
    .desc{margin-top:14px;font-size:15px;line-height:1.82;color:var(--text);}
    .keywords{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
    .tag{padding:8px 12px;border-radius:999px;background:rgba(23,22,20,.05);font-size:13px;color:#514a42;}
    .emblem-wrap{
      width:132px;height:132px;border-radius:34px;border:1px solid var(--line);background:rgba(255,255,255,.7);display:grid;place-items:center;flex:0 0 auto;overflow:hidden;
      box-shadow:0 12px 24px rgba(23,22,20,.06);
    }
    .emblem-wrap svg{width:110px;height:110px;}
    .section{margin-top:16px;}
    .section-title{font-size:12px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}
    .share-box,.friend-box{padding:16px;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.65);}
    .linkline{word-break:break-all;font-size:13px;line-height:1.6;color:#62584f;padding:10px 12px;border-radius:14px;background:rgba(23,22,20,.04);margin-top:10px;}
    .actions{display:grid;gap:12px;margin-top:16px;}
    .toast{position:fixed;left:50%;bottom:calc(92px + var(--safe-bottom));transform:translateX(-50%);padding:12px 16px;border-radius:999px;background:rgba(23,22,20,.92);color:#fff;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:40;}
    .toast.show{opacity:1;}
    .compat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
    .pair-card{padding:14px 12px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.7);}
    .pair-k{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .pair-v{font-size:16px;font-weight:760;line-height:1.45;}
    .compat-emblems{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-top:18px;}
    .compat-emblems .emblem-wrap{width:104px;height:104px;border-radius:28px;justify-self:center;}
    .compat-emblems .emblem-wrap svg{width:84px;height:84px;}
    .divider-dot{width:36px;height:36px;border-radius:999px;background:rgba(129,95,61,.12);display:grid;place-items:center;color:#7d5b39;font-weight:800;border:1px solid rgba(129,95,61,.16);}
    .empty{padding:28px 18px;text-align:center;color:var(--muted);line-height:1.8;}
    .friend-note{margin-top:16px;padding:14px 16px;border-radius:18px;background:rgba(129,95,61,.10);color:#664c34;line-height:1.7;border:1px solid rgba(129,95,61,.14);}
    .subtle{font-size:14px;color:var(--muted);line-height:1.75;}
    .promo-note{margin-top:16px;padding:14px 16px;border-radius:18px;background:rgba(23,22,20,.04);border:1px dashed var(--line-strong);color:#5f554b;font-size:14px;line-height:1.8;}
    .history-list{display:grid;gap:10px;margin-top:12px;}
    .history-item{display:flex;justify-content:space-between;gap:14px;align-items:center;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.72);border:1px solid var(--line);}
    .history-item .left{min-width:0;}
    .history-item .title{font-size:14px;font-weight:760;line-height:1.5;}
    .history-item .meta{font-size:12px;color:var(--muted);margin-top:2px;}
    .history-badge{padding:8px 10px;border-radius:999px;background:rgba(129,95,61,.12);border:1px solid rgba(129,95,61,.14);font-size:12px;color:#6a4d30;white-space:nowrap;}
    .mini-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
    .qr-wrap{display:grid;grid-template-columns:132px 1fr;gap:14px;align-items:center;margin-top:14px;}
    .qr-card{width:132px;height:132px;border-radius:22px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;box-shadow:0 8px 18px rgba(23,22,20,.05);overflow:hidden;}
    .qr-card canvas,.qr-card img{width:112px;height:112px;display:block;}
    .qr-fallback{width:96px;height:96px;border-radius:16px;background:linear-gradient(135deg, rgba(129,95,61,.12), rgba(23,22,20,.04));display:grid;place-items:center;color:#6a4d30;font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
    .qr-note{font-size:14px;color:var(--muted);line-height:1.75;}
    @media (max-width:420px){
      .qr-wrap{grid-template-columns:116px 1fr;gap:12px;}
      .qr-card{width:116px;height:116px;border-radius:20px;}
      .qr-card canvas,.qr-card img{width:98px;height:98px;}
      .question-text{font-size:23px;}
      .result-name,.compat-name{font-size:30px;}
      .emblem-wrap{width:118px;height:118px;border-radius:28px;}
      .emblem-wrap svg{width:98px;height:98px;}
      .compat-emblems .emblem-wrap{width:92px;height:92px;}
      .compat-emblems .emblem-wrap svg{width:74px;height:74px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M31 15c4-1 7 1 8 5 1 4-1 7-4 8-3 1-7-1-8-5-1-4 1-7 4-8Z" stroke="currentColor" stroke-width="2.4"/>
            <path d="M24 22c3-1 5 1 6 4 .8 2.8-.5 5.3-3 6-2.5.7-5.3-.7-6-3.5-.7-2.8.5-5.4 3-6.5Z" stroke="currentColor" stroke-width="2.4"/>
            <path d="M38 22c3-1 5 1 6 4 .8 2.8-.5 5.3-3 6-2.5.7-5.3-.7-6-3.5-.7-2.8.5-5.4 3-6.5Z" stroke="currentColor" stroke-width="2.4"/>
            <path d="M32 29c8 0 15 6 15 14 0 6-4 9-11 9H28c-7 0-11-3-11-9 0-8 7-14 15-14Z" stroke="currentColor" stroke-width="2.4"/>
          </svg>
        </div>
        <div>
          <div>footi</div>
          <div class="tiny">测测你是哪种脚</div>
        </div>
      </div>
      <div class="progress-chip" id="progressChip">01 / 12</div>
    </div>

    <section class="view active" id="testView">
      <div class="card question-card">
        <div class="hero-mark" id="questionMark"></div>
        <div class="question-no" id="questionNo">question 01</div>
        <h1 class="question-text" id="questionText"></h1>
        <p class="helper">选一个最像你的反应。没有标准答案。</p>
        <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <section class="view" id="resultView"></section>
    <section class="view" id="compatView"></section>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div class="bottom-wrap">
      <button class="btn secondary" id="prevBtn">上一题</button>
      <button class="btn primary" id="nextBtn">下一题</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script>
    const promoLine = "其实真的有这款游戏在今年某月发布，关注 xhs @教的主";

    const appData = {
      questions: [
        { id:1, weight:1.5, text:"准备出门，面前有四双符合你尺码的鞋，你会选择？", options:[
          {label:"A", text:"闻起来最香的（是的你闻了一遍）", primary:"Se", secondary:null},
          {label:"B", text:"外观最符合你审美的", primary:"Fi", secondary:null},
          {label:"C", text:"会说话的鞋，大喊不要穿它", primary:"Ne", secondary:null},
          {label:"D", text:"会说话的鞋，大喊快来穿它", primary:"Ni", secondary:null},

        ]},
        { id:2, weight:1.0, text:"你在门口看到一个清洁工，他问你有没有需要带走的垃圾，你选择？", options:[

          {label:"B", text:"把最臭的鞋给他", primary:"Se", secondary:null},
          {label:"C", text:"自己躺进清洁车里", primary:"Ne", secondary:null},
          {label:"D", text:"别碍事", primary:"Te", secondary:null}
        ]},
        { id:3, weight:0.5, text:"打发走清洁工之后，你来到家门口的走廊，但是感觉和平常不一样？", options:[
          {label:"A", text:"发现走廊的门都贴着一样的对联", primary:"Si", secondary:null},
          {label:"B", text:"感觉地板上有很多脚要冲出来踹你", primary:"Se", secondary:"Ni"},
          {label:"C", text:"觉得走廊没有尽头", primary:"Ni", secondary:null},
          {label:"D", text:"不管是什么异常，先回家", primary:"Te", secondary:"Si"}
        ]},
        { id:4, weight:1.0, text:"街上的人都在往一个方向单脚跳跃，你会？", options:[

          {label:"B", text:"这群人是丧尸吧，迅速远离", primary:"Te", secondary:"Se"},

          {label:"B", text:"哦吼帮我按摩一下那边对对对", primary:"Fi", secondary:"Se"},

      results: {

    function computeScores(){
      const scores = {Se:0,Si:0,Ne:0,Ni:0,Te:0,Ti:0,Fe:0,Fi:0};
      appData.questions.forEach((q, i) => {
        const answerIndex = answers[i];
        if (answerIndex === null) return;
        const choice = q.options[answerIndex];
        scores[choice.primary] += 2 * q.weight;
        if (choice.secondary) scores[choice.secondary] += 1 * q.weight;
      });
      return scores;
    }

    function getTypeFromScores(scores){
      const ext = scores.Se + scores.Ne + scores.Te + scores.Fe;
      const intl = scores.Si + scores.Ni + scores.Ti + scores.Fi;
      const EI = ext >= intl ? 'E' : 'I';
      const S = scores.Se + scores.Si;
      const N = scores.Ne + scores.Ni;
      const SN = N >= S ? 'N' : 'S';
      const T = scores.Te + scores.Ti;
      const F = scores.Fe + scores.Fi;
      const TF = T >= F ? 'T' : 'F';
      let JP = 'J';
      if (EI === 'E') {
        JP = (scores.Te + scores.Fe) >= (scores.Se + scores.Ne) ? 'J' : 'P';
      } else {
        JP = (scores.Ti + scores.Fi) >= (scores.Si + scores.Ni) ? 'J' : 'P';
      }
      return EI + SN + TF + JP;
    }

      const scores = computeScores();

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines=4){
      const chars = Array.from(text);
      let line = '';
      let lines = [];
      for (const ch of chars){
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line){
          lines.push(line);
          line = ch;
          if (lines.length >= maxLines-1) break;
        } else line = test;
      }
      if (line && lines.length < maxLines) lines.push(line);
      if (lines.length === maxLines && chars.join('').length > lines.join('').length){
        let last = lines[maxLines-1];
        while (ctx.measureText(last + '…').width > maxWidth && last) last = last.slice(0,-1);
        lines[maxLines-1] = last + '…';
      }
      lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight));
      return y + (lines.length-1)*lineHeight;
    }

    function roundRect(ctx, x, y, w, h, r, fill, stroke){
      ctx.beginPath();
      ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r); ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

            <div class="promo-note">${promoLine}</div>
          </div>
        </div>
      `;
      renderQrInto(document.getElementById('resultQrBox'), pairLink);
      document.getElementById('copyPairBtn').addEventListener('click', async () => {
        const ok = await copyText(pairLink);
        showToast(ok ? '链接已复制' : '复制失败');
      });
      document.getElementById('saveResultCardBtn').addEventListener('click', () => saveShareCard('result'));
      document.getElementById('goCompatBtn').addEventListener('click', () => setView('compat'));
      document.getElementById('restartBtn').addEventListener('click', restartTest);
    }

    function getTemperament(type){
      return Object.entries(appData.temperamentGroups).find(([, arr]) => arr.includes(type))?.[0] || null;
    }
    function shareAxis(a, b){
      return a[0] === b[0] || a[1] === b[1] || a[2] === b[2] || a[3] === b[3];
    }
    function getCompatibilityLevel(a, b){
      if (a === b) return 'S';
      if (appData.dominantFunctions[a] === appData.dominantFunctions[b]) return 'S';
      if (getTemperament(a) === getTemperament(b)) return 'A';
      if (shareAxis(a, b)) return 'B';
      return 'D';
    }

    function renderCompat(){
      if (!latestResultCode || !appData.results[latestResultCode]){
        viewEls.compat.innerHTML = `<div class="card compat-card"><div class="empty">先完成测试，这里就会出现你的朋友相性。</div></div>`;
        return;
      }
      const selfCode = latestResultCode;
      const self = appData.results[selfCode];
      const history = getPairHistory();
      const historyHtml = history.length ? `
        <div class="section share-box">
          <div class="section-title">历史配对</div>
          <div class="history-list">
            ${history.map(item => {
              const a = appData.results[item.selfCode];
              const b = appData.results[item.friendCode];
              const lv = appData.compatibility[item.levelKey];
              return `<div class="history-item"><div class="left"><div class="title">${a.name} × ${b.name}</div><div class="meta">${formatTime(item.time)}</div></div><div class="history-badge">${lv.name}</div></div>`;
            }).join('')}
          </div>
        </div>` : '';
      if (!(pairCode && validCodes.has(pairCode))){
        const selfLink = buildPairLink(selfCode);
        viewEls.compat.innerHTML = `
          <div class="card compat-card">
            <div class="compat-head">
              <div>
                <div class="pill">footi compatibility</div>
                <h2 class="compat-name">朋友相性</h2>
                <p class="share-line">把你的链接发给朋友，等朋友做完测试，就会在同一条链接里长出你们的配对结果。</p>
              </div>
            </div>
            <div class="compat-emblems">
              <div class="emblem-wrap">${renderBadge(selfCode)}</div>
              <div class="divider-dot">+</div>
              <div class="emblem-wrap">${renderQuestionMark('players')}</div>
            </div>
            <div class="section share-box">
              <div class="section-title">你的朋友配对链接</div>
              <div class="linkline">${selfLink}</div>
              <div class="qr-wrap">
                <div class="qr-card" id="compatEmptyQrBox"></div>
                <div class="qr-note">把这张码和链接一起发出去，朋友扫码后先做测试，完成后会直接回到你们的配对页。</div>
              </div>
              <div class="actions">
                <button class="btn accent" id="copySelfPairBtn">复制配对链接</button>
                <button class="btn secondary" id="saveResultCardBtn">保存分享图</button>
                <button class="btn secondary" id="backResultBtn">返回结果</button>
              </div>
              <div class="promo-note">${promoLine}</div>
            </div>
            ${historyHtml}
          </div>
        `;
        renderQrInto(document.getElementById('compatEmptyQrBox'), selfLink);
        document.getElementById('copySelfPairBtn').addEventListener('click', async () => {
          const ok = await copyText(selfLink);
          showToast(ok ? '链接已复制' : '复制失败');
        });
        document.getElementById('saveResultCardBtn').addEventListener('click', () => saveShareCard('result'));
        document.getElementById('backResultBtn').addEventListener('click', () => setView('result'));
        return;
      }
      const friendCode = pairCode;
      const friend = appData.results[friendCode];
      const levelKey = getCompatibilityLevel(selfCode, friendCode);
      const level = appData.compatibility[levelKey];
      addPairHistory(selfCode, friendCode, levelKey);
      const mergedHistoryHtml = getPairHistory().length ? `
        <div class="section share-box">
          <div class="section-title">历史配对</div>
          <div class="history-list">
            ${getPairHistory().map(item => {
              const a = appData.results[item.selfCode];
              const b = appData.results[item.friendCode];
              const lv = appData.compatibility[item.levelKey];
              return `<div class="history-item"><div class="left"><div class="title">${a.name} × ${b.name}</div><div class="meta">${formatTime(item.time)}</div></div><div class="history-badge">${lv.name}</div></div>`;
            }).join('')}
          </div>
        </div>` : '';
      viewEls.compat.innerHTML = `
        <div class="card compat-card">
          <div class="compat-head">
            <div>
              <div class="pill">footi compatibility</div>
              <h2 class="compat-name">${level.name}</h2>
              <p class="share-line">${level.tagline}</p>
            </div>
          </div>
          <div class="compat-emblems">
            <div class="emblem-wrap">${renderBadge(selfCode)}</div>
            <div class="divider-dot">×</div>
            <div class="emblem-wrap">${renderBadge(friendCode)}</div>
          </div>
          <div class="compat-grid">
            <div class="pair-card"><div class="pair-k">你的脚</div><div class="pair-v">${self.name}</div></div>
            <div class="pair-card"><div class="pair-k">朋友的脚</div><div class="pair-v">${friend.name}</div></div>
          </div>
          <div class="section friend-box">
            <div class="section-title">相性描述</div>
            <p class="desc" style="margin-top:0;">${level.description}</p>
            <p class="desc" style="margin-top:10px;">${level.note}</p>
          </div>
          <div class="friend-note">${self.name} 和 ${friend.name} 站在一起，会把一段普通的路走出自己的镜头感。你们的节奏会在相遇之后慢慢成形，越走越有样子。</div>
          <div class="section share-box">
            <div class="section-title">继续发给朋友</div>
            <div class="subtle">这条配对链接会把下一位朋友也带回同一组配对入口，扫码和复制都可以继续传播。</div>
            <div class="linkline">${buildPairLink(selfCode)}</div>
            <div class="qr-wrap">
              <div class="qr-card" id="compatQrBox"></div>
              <div class="qr-note">截图带上这个二维码，朋友扫码后会直接进入测试，做完就能看到和你的相性结果。</div>
            </div>
          </div>
          <div class="actions">
            <button class="btn accent" id="shareSelfBtn">复制我的配对链接</button>
            <button class="btn secondary" id="saveCompatCardBtn">保存分享图</button>
            <button class="btn secondary" id="backResultBtn">返回结果</button>
            <button class="btn secondary" id="restartFromCompatBtn">重新测试</button>
          </div>
          <div class="promo-note">${promoLine}</div>
          ${mergedHistoryHtml}
        </div>
      `;
      renderQrInto(document.getElementById('compatQrBox'), buildPairLink(selfCode));
      document.getElementById('shareSelfBtn').addEventListener('click', async () => {
        const ok = await copyText(buildPairLink(selfCode));
        showToast(ok ? '链接已复制' : '复制失败');
      });
      document.getElementById('saveCompatCardBtn').addEventListener('click', () => saveShareCard('compat'));
      document.getElementById('backResultBtn').addEventListener('click', () => setView('result'));
      document.getElementById('restartFromCompatBtn').addEventListener('click', restartTest);
    }

    function restartTest(){
      clearTimeout(autoNextTimer);
      answers = Array(appData.questions.length).fill(null);
      currentIndex = 0;
      setView('test');
      renderQuestion();
    }

    function renderQuestionMark(kind){
      const common = 'stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"';
      const maps = {
        mist:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M18 18c0 5 4 9 9 9h19c5 0 8-3 8-8s-4-8-9-8H27c-5 0-9 3-9 7Z"/><path ${common} d="M14 38h36"/><path ${common} d="M20 46h24"/><path ${common} d="M26 54h12"/></svg>`,
        bag:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M24 18c0-5 3-8 8-8s8 3 8 8"/><path ${common} d="M18 22h28l-2 28H20l-2-28Z"/><path ${common} d="M25 31h14"/><circle cx="25" cy="31" r="1.7" fill="currentColor"/><circle cx="39" cy="31" r="1.7" fill="currentColor"/></svg>`,
        hall:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M16 52V14h32v38"/><path ${common} d="M24 52V22h16v30"/><path ${common} d="M16 18h32"/><path ${common} d="M24 26h16"/></svg>`,
        jump:`<svg viewBox="0 0 64 64" fill="none"><circle cx="22" cy="18" r="5" ${common}/><path ${common} d="M20 27l8 8 8-4"/><path ${common} d="M28 35l-6 13"/><path ${common} d="M29 37l12 11"/><path ${common} d="M12 49h40"/></svg>`,
        kick:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M18 34c8-8 16-8 24 0"/><path ${common} d="M42 34l10 4-4 8-16-2"/><path ${common} d="M25 22c2-5 6-8 12-8"/><path ${common} d="M16 48h20"/></svg>`,
        shoe:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M12 40c10 0 13-10 14-16l10 6c3 2 8 3 12 3h4v11H12v-4Z"/><path ${common} d="M18 44h30"/></svg>`,
        players:`<svg viewBox="0 0 64 64" fill="none"><circle cx="20" cy="20" r="5" ${common}/><circle cx="32" cy="16" r="5" ${common}/><circle cx="44" cy="20" r="5" ${common}/><path ${common} d="M14 46c2-7 5-11 10-11s8 4 10 11"/><path ${common} d="M24 46c2-7 5-11 8-11s6 4 8 11"/><path ${common} d="M34 46c2-7 5-11 10-11s8 4 10 11"/></svg>`,
        bus:`<svg viewBox="0 0 64 64" fill="none"><rect x="12" y="16" width="40" height="28" rx="8" ${common}/><path ${common} d="M18 24h28"/><path ${common} d="M18 32h12"/><path ${common} d="M38 32h8"/><circle cx="22" cy="47" r="4" ${common}/><circle cx="42" cy="47" r="4" ${common}/></svg>`,
        radio:`<svg viewBox="0 0 64 64" fill="none"><rect x="14" y="18" width="36" height="28" rx="8" ${common}/><path ${common} d="M20 30h10"/><circle cx="40" cy="32" r="5" ${common}/><path ${common} d="M18 14l10 4"/><path ${common} d="M24 50h16"/></svg>`,
        room:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M16 50V18l16-8 16 8v32"/><path ${common} d="M24 50V34h16v16"/><path ${common} d="M20 24h24"/></svg>`,
        diary:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M18 14h22c4 0 6 2 6 6v30H24c-4 0-6-2-6-6V14Z"/><path ${common} d="M24 18v32"/><path ${common} d="M30 24h10"/><path ${common} d="M30 32h10"/><path ${common} d="M30 40h8"/></svg>`,
        ending:`<svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="18" ${common}/><path ${common} d="M32 18v28"/><path ${common} d="M18 32h28"/><path ${common} d="M23 23l18 18"/><path ${common} d="M41 23 23 41"/></svg>`
      };
      return maps[kind] || maps.mist;
    }

    function badgeFrame(inner){
      return `<svg viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="120" height="120" rx="34" fill="rgba(255,255,255,.76)"/>
        <circle cx="70" cy="70" r="44" fill="rgba(129,95,61,.08)"/>
        ${inner}
      </svg>`;
    }

    function renderBadge(code){
      const s = 'stroke="#6d5337" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"';
      const c = '#6d5337';
      const badges = {
        INFJ: badgeFrame(`<path ${s} d="M70 34c4 11 11 18 22 22-11 4-18 11-22 22-4-11-11-18-22-22 11-4 18-11 22-22Z"/><path ${s} d="M51 86c8-3 14-8 19-15 5 7 11 12 19 15"/><path ${s} d="M60 99h20"/>`),
        ENFJ: badgeFrame(`<circle cx="70" cy="46" r="10" ${s}/><path ${s} d="M48 90c6-17 14-25 22-25s16 8 22 25"/><path ${s} d="M44 52c8 0 12-4 16-12 4 8 8 12 16 12 8 0 12-4 16-12"/>`),
        ENFP: badgeFrame(`<path ${s} d="M44 86c8-18 18-24 26-24 12 0 15 18 26 18"/><path ${s} d="M44 62c8-18 18-24 26-24 12 0 15 18 26 18"/><circle cx="51" cy="45" r="4" fill="${c}"/><circle cx="90" cy="92" r="4" fill="${c}"/>`),
        INFP: badgeFrame(`<path ${s} d="M54 44c4 10 2 18-6 24 13 2 22 10 26 24 4-14 13-22 26-24-8-6-10-14-6-24"/><path ${s} d="M70 44v48"/>`),
        INTJ: badgeFrame(`<path ${s} d="M70 34 96 52 86 96 54 96 44 52 70 34Z"/><path ${s} d="M58 62 70 46l12 16-12 18-12-18Z"/>`),
        ENTJ: badgeFrame(`<path ${s} d="M46 92h48"/><path ${s} d="M52 78h36"/><path ${s} d="M58 64h24"/><path ${s} d="M64 50h12"/><path ${s} d="M70 38v12"/>`),
        ENTP: badgeFrame(`<path ${s} d="M46 74c0-12 9-18 18-18s18 6 18 18-9 18-18 18-18-6-18-18Z"/><path ${s} d="M58 56c0-8 6-12 12-12s12 4 12 12"/><circle cx="58" cy="74" r="3" fill="${c}"/><circle cx="82" cy="74" r="3" fill="${c}"/>`),
        INTP: badgeFrame(`<path ${s} d="M70 34v16"/><path ${s} d="M70 90v16"/><path ${s} d="M34 70h16"/><path ${s} d="M90 70h16"/><path ${s} d="M46 46l11 11"/><path ${s} d="M83 83 94 94"/><path ${s} d="M94 46 83 57"/><path ${s} d="M46 94 57 83"/><circle cx="70" cy="70" r="12" ${s}/>`),
        ISTJ: badgeFrame(`<rect x="44" y="44" width="52" height="52" rx="14" ${s}/><path ${s} d="M70 44v52"/><path ${s} d="M44 70h52"/><circle cx="57" cy="57" r="2.5" fill="${c}"/><circle cx="83" cy="57" r="2.5" fill="${c}"/><circle cx="57" cy="83" r="2.5" fill="${c}"/><circle cx="83" cy="83" r="2.5" fill="${c}"/>`),
        ESTJ: badgeFrame(`<path ${s} d="M48 42h44v18H48z"/><path ${s} d="M54 60h32v18H54z"/><path ${s} d="M60 78h20v18H60z"/><path ${s} d="M48 42 40 50"/><path ${s} d="M92 42 100 50"/>`),
        ISFJ: badgeFrame(`<circle cx="55" cy="55" r="12" ${s}/><circle cx="85" cy="55" r="12" ${s}/><circle cx="55" cy="85" r="12" ${s}/><circle cx="85" cy="85" r="12" ${s}/><circle cx="70" cy="70" r="10" fill="rgba(129,95,61,.16)"/>`),
        ESFJ: badgeFrame(`<circle cx="70" cy="70" r="10" ${s}/><path ${s} d="M70 38c4 12 10 18 22 22-12 4-18 10-22 22-4-12-10-18-22-22 12-4 18-10 22-22Z"/><circle cx="70" cy="70" r="4" fill="${c}"/>`),
        ISTP: badgeFrame(`<path ${s} d="M70 34 92 44v20c0 16-10 26-22 34-12-8-22-18-22-34V44l22-10Z"/><path ${s} d="M59 68h22"/><path ${s} d="M63 56h14"/>`),
        ESTP: badgeFrame(`<path ${s} d="M46 92c0-18 10-30 24-30 14 0 24 12 24 30"/><path ${s} d="M50 90h44"/><path ${s} d="M70 34v26"/><path ${s} d="M60 54h20"/><circle cx="70" cy="46" r="4" fill="${c}"/>`),
        ISFP: badgeFrame(`<path ${s} d="M42 84c14-2 22-10 28-26 4 10 10 16 18 20"/><path ${s} d="M50 96c12-2 20-8 26-18"/><circle cx="90" cy="54" r="4" fill="${c}"/><circle cx="98" cy="46" r="3" fill="${c}"/>`),
        ESFP: badgeFrame(`<path ${s} d="M70 36 76 52 94 52 80 62 86 80 70 70 54 80 60 62 46 52 64 52 70 36Z"/><circle cx="94" cy="42" r="4" fill="${c}"/><circle cx="48" cy="90" r="3.5" fill="${c}"/>`)
      };
      return badges[code] || badges.INFJ;
    }

    renderQuestion();
  </script>
</body>
</html>
