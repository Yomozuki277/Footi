<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>footi</title>
  <meta name="description" content="footi｜测测你是哪种脚" />
  <style>
    :root{
      --bg:#07090d;
      --bg2:#0e1320;
      --white:#f7f9fd;
      --text:#f5f8ff;
      --muted:#a7b2c9;
      --blue:#77a9ff;
      --blue-soft:rgba(119,169,255,.18);
      --glass:rgba(255,255,255,.15);
      --glass-strong:rgba(255,255,255,.18);
      --glass-soft:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.14);
      --line-strong:rgba(255,255,255,.24);
      --shadow:0 20px 64px rgba(0,0,0,.34);
      --blur:12px;
      --radius-xl:30px;
      --radius-lg:24px;
      --radius-md:18px;
      --safe-bottom:max(16px, env(safe-area-inset-bottom));
      --transition:220ms ease;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(119,169,255,.20), transparent 24%),
        radial-gradient(circle at 85% 14%, rgba(255,255,255,.07), transparent 18%),
        radial-gradient(circle at 50% 110%, rgba(119,169,255,.12), transparent 36%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      overflow-x:hidden;
    }
    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      pointer-events:none;
      filter:blur(60px);
      opacity:.8;
      z-index:0;
    }
    body::before{width:180px;height:180px;left:-40px;top:18%;background:rgba(119,169,255,.14);border-radius:999px}
    body::after{width:160px;height:160px;right:-30px;bottom:16%;background:rgba(255,255,255,.08);border-radius:999px}
    .app{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:18px 16px calc(110px + var(--safe-bottom))}
    .view{display:none;animation:fade .25s ease}
    .view.active{display:block}
    @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    .glass{
      background:linear-gradient(180deg, rgba(255,255,255,.15), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
    }
    .card{border-radius:var(--radius-xl);padding:20px 18px}
    .topbar,.bottom-bar,.card,.hero-mark,.option,.btn,.tag,.pill,.level-chip,.emblem-wrap,.story-card,.mini-card,.pair-input,.history-item,.archive-cell,.empty-card,.stat-card,.inline-chip,.pair-linkline{
      background:linear-gradient(180deg, rgba(255,255,255,.15), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
    }

    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      border-radius:26px;padding:12px 14px;margin-bottom:16px;
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .brand-mark{width:42px;height:42px;border-radius:16px;display:grid;place-items:center;color:var(--white);background:linear-gradient(180deg, rgba(119,169,255,.28), rgba(255,255,255,.10));border:1px solid rgba(255,255,255,.14)}
    .brand-mark svg{width:26px;height:26px}
    .brand-title{font-size:16px;font-weight:800;letter-spacing:.04em}
    .brand-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .chip{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:12px;font-weight:700;color:#d9e8ff;white-space:nowrap}

    .question-card{padding:20px}
    .hero-row{display:flex;align-items:center;justify-content:flex-start;margin-bottom:16px}
    .hero-mark{width:68px;height:68px;border-radius:22px;display:grid;place-items:center;color:#eef5ff;background:linear-gradient(180deg, rgba(119,169,255,.22), rgba(255,255,255,.08))}
    .hero-mark svg{width:38px;height:38px}
    .question-no{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .question-text{margin:0;font-size:28px;line-height:1.42;font-weight:820;letter-spacing:-.02em}
    .helper{margin:12px 0 0;color:var(--muted);font-size:14px;line-height:1.75}
    .progress-line{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin:18px 0 14px}
    .progress-fill{height:100%;width:0;background:linear-gradient(90deg, rgba(255,255,255,.55), var(--blue));transition:width .25s ease}
    .options{display:grid;gap:12px;margin-top:14px}
    .option{width:100%;text-align:left;padding:14px 16px;border-radius:22px;display:flex;gap:14px;align-items:flex-start;color:var(--text);cursor:pointer;transition:transform var(--transition), border-color var(--transition), background var(--transition)}
    .option:hover{transform:translateY(-1px);border-color:rgba(119,169,255,.34)}
    .option.active{border-color:rgba(119,169,255,.45);background:linear-gradient(180deg, rgba(119,169,255,.24), rgba(255,255,255,.09))}
    .option-key{flex:0 0 auto;width:28px;height:28px;border-radius:999px;display:grid;place-items:center;background:rgba(255,255,255,.10);font-size:12px;font-weight:800;color:#d6e5ff;border:1px solid rgba(255,255,255,.12)}
    .option-text{font-size:15px;line-height:1.7;font-weight:600}

    .face-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
    .face-option{position:relative;width:100%;padding:14px;border-radius:24px;text-align:center;color:var(--text);cursor:pointer;transition:transform var(--transition), border-color var(--transition), background var(--transition)}
    .face-option:hover{transform:translateY(-1px);border-color:rgba(119,169,255,.34)}
    .face-option.active{border-color:rgba(119,169,255,.45);background:linear-gradient(180deg, rgba(119,169,255,.24), rgba(255,255,255,.09))}
    .face-option .face-key{position:absolute;left:12px;top:12px;width:24px;height:24px;border-radius:999px;display:grid;place-items:center;font-size:11px;font-weight:800;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);color:#d6e5ff}
    .face-icon{width:100%;aspect-ratio:1/1;display:grid;place-items:center;border-radius:18px;background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(119,169,255,.08));border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
    .face-icon .emoji-face{display:grid;place-items:center;width:74px;height:74px;border-radius:999px;background:rgba(9,12,20,.72);border:1px solid rgba(255,255,255,.16);font-size:42px;line-height:1;filter:drop-shadow(0 6px 16px rgba(0,0,0,.28))}
    .face-icon .emoji-face span{transform:translateY(-1px)}

    .bottom-bar{position:fixed;left:0;right:0;bottom:0;padding:12px 16px calc(14px + var(--safe-bottom));z-index:20;background:linear-gradient(180deg, rgba(7,9,13,.0), rgba(7,9,13,.65) 38%, rgba(7,9,13,.9) 100%)}
    .bottom-wrap{max-width:760px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{min-height:54px;border-radius:999px;padding:12px 16px;border:none;color:var(--text);font-size:15px;font-weight:800;cursor:pointer;transition:transform var(--transition), border-color var(--transition), opacity var(--transition)}
    .btn:hover{transform:translateY(-1px);border-color:rgba(119,169,255,.34)}
    .btn.primary{background:linear-gradient(180deg, rgba(119,169,255,.30), rgba(255,255,255,.12))}
    .btn.secondary{background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08))}
    .btn.ghost{background:rgba(255,255,255,.08)}
    .btn.inline{min-height:48px}
    .btn:disabled{opacity:.42;cursor:not-allowed;transform:none}

    .result-card,.archive-card{padding:20px 18px}
    .result-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
    .pill,.level-chip,.inline-chip{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:8px 12px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#d7e7ff}
    .result-name{margin:14px 0 0;font-size:34px;line-height:1.15;letter-spacing:-.03em}
    .share-line{margin:10px 0 0;font-size:15px;color:#dbe8ff;line-height:1.7}
    .desc{margin:18px 0 0;font-size:15px;line-height:1.9;color:#edf3ff}
    .keywords{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .tag{padding:8px 12px;border-radius:999px;font-size:12px;color:#dce9ff;border-color:rgba(119,169,255,.24)}
    .section{margin-top:18px}
    .section-title{font-size:14px;font-weight:760;line-height:1.5;margin-bottom:10px}
    .emblem-wrap{width:126px;height:126px;border-radius:34px;display:grid;place-items:center;flex:0 0 auto;overflow:hidden;background:linear-gradient(180deg, rgba(119,169,255,.18), rgba(255,255,255,.08))}
    .emblem-wrap svg{width:106px;height:106px}
    .story-grid,.mini-grid,.pair-actions.two,.stats-grid,.archive-grid{display:grid;gap:12px}
    .story-grid{grid-template-columns:1fr 1fr}
    .mini-grid{grid-template-columns:1fr 1fr}
    .story-card,.mini-card,.pair-input,.history-item,.archive-cell,.empty-card,.stat-card,.pair-linkline{border-radius:22px;padding:16px}
    .story-card strong,.mini-card strong,.stat-title{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .story-card p,.mini-card p,.empty-card p{font-size:15px;line-height:1.82;color:#edf4ff;margin:0}
    .pair-actions.two,.stats-grid{grid-template-columns:1fr 1fr}
    .pair-input input{width:100%;min-height:52px;border:none;outline:none;background:transparent;color:var(--text);font-size:14px}
    .pair-input input::placeholder{color:#90a0bb}
    .pair-linkline{word-break:break-all;font-size:13px;line-height:1.8;color:#e2ecff}
    .friend-compat{margin-top:18px;display:grid;gap:16px}
    .compat-band{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .compat-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
    .spark{width:44px;height:44px;border-radius:999px;display:grid;place-items:center;background:linear-gradient(180deg, rgba(119,169,255,.26), rgba(255,255,255,.10));border:1px solid rgba(255,255,255,.14);font-weight:900;color:#f7fbff}
    .stat-card{padding:14px 14px 16px}
    .stat-value{font-size:16px;font-weight:780;line-height:1.6}
    .tiny{font-size:12px;color:var(--muted);line-height:1.6}
    .history-list{display:grid;gap:10px;margin-top:12px}
    .history-item{display:flex;align-items:center;justify-content:space-between;gap:12px;border-radius:18px;padding:14px}
    .history-title{font-size:14px;font-weight:760;line-height:1.5}
    .history-meta,.archive-meta{font-size:12px;color:var(--muted);line-height:1.6;margin-top:4px}
    .history-badge,.archive-badge{padding:8px 10px;border-radius:999px;background:rgba(119,169,255,.16);border:1px solid rgba(119,169,255,.22);font-size:12px;color:#dce9ff;white-space:nowrap}
    .promo-note{margin-top:18px;padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.08);border:1px dashed rgba(119,169,255,.26);color:#e2ecff;font-size:14px;line-height:1.8}
    .archive-header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .archive-grid{grid-template-columns:1fr 1fr;margin-top:16px}
    .archive-cell{min-height:130px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
    .archive-cell.locked{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08);box-shadow:none;filter:saturate(.55)}
    .archive-cell.locked .archive-foot,.archive-cell.locked .archive-meta,.archive-cell.locked .archive-unknown{color:#7d879a}
    .archive-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .archive-foot{font-size:15px;font-weight:780;line-height:1.45}
    .archive-unknown{font-size:28px;font-weight:900}
    .empty-card{text-align:center;padding:28px 18px}
    .toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-bottom));transform:translateX(-50%);padding:12px 16px;border-radius:999px;background:rgba(255,255,255,.92);color:#08111d;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:30}
    .toast.show{opacity:1}

    @media (max-width:520px){
      .app{padding:14px 12px calc(108px + var(--safe-bottom))}
      .topbar{padding:10px 12px}
      .question-card,.result-card,.archive-card{padding:18px 16px}
      .question-text{font-size:24px}
      .result-name{font-size:30px}
      .emblem-wrap{width:110px;height:110px;border-radius:30px}
      .emblem-wrap svg{width:92px;height:92px}
      .story-grid,.mini-grid,.pair-actions.two,.stats-grid,.archive-grid{grid-template-columns:1fr}
      .face-icon .emoji-face{width:68px;height:68px;font-size:38px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M31 15c4-1 7 1 8 5 1 4-1 7-4 8-3 1-7-1-8-5-1-4 1-7 4-8Z" stroke="currentColor" stroke-width="2.4"/>
            <path d="M24 22c3-1 5 1 6 4 .8 2.8-.5 5.3-3 6-2.5.7-5.3-.7-6-3.5-.7-2.8.5-5.4 3-6.5Z" stroke="currentColor" stroke-width="2.4"/>
            <path d="M38 22c3-1 5 1 6 4 .8 2.8-.5 5.3-3 6-2.5.7-5.3-.7-6-3.5-.7-2.8.5-5.4 3-6.5Z" stroke="currentColor" stroke-width="2.4"/>
            <path d="M32 29c8 0 15 6 15 14 0 6-4 9-11 9H28c-7 0-11-3-11-9 0-8 7-14 15-14Z" stroke="currentColor" stroke-width="2.4"/>
          </svg>
        </div>
        <div>
          <div class="brand-title">footi</div>
          <div class="brand-sub">测测你是哪种脚</div>
        </div>
      </div>
      <div class="chip" id="progressChip">01 / 14</div>
    </div>

    <section class="view active" id="testView">
      <div class="card question-card">
        <div class="hero-row">
          <div class="hero-mark" id="questionMark"></div>
        </div>
        <div class="question-no" id="questionNo">question 01</div>
        <h1 class="question-text" id="questionText"></h1>
        <p class="helper">选一个最像你的反应。</p>
        <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <section class="view" id="resultView"></section>
    <section class="view" id="archiveView"></section>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div class="bottom-wrap">
      <button class="btn secondary" id="prevBtn">上一题</button>
      <button class="btn primary" id="nextBtn">下一题</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const promoLine = "其实真的有这款游戏在今年某月发布，关注 xhs @教的主";

    const appData = {
      questions: [
        { id:1, weight:1.5, icon:'mist', text:'准备出门，面前有四双符合你尺码的鞋，你会选择', options:[
          {label:'A', text:'闻起来最香的（是的你闻了一遍）', primary:'Se', secondary:null},
          {label:'B', text:'外观最符合你审美的', primary:'Fi', secondary:null},
          {label:'C', text:'会说话的鞋，大喊不要穿它', primary:'Ne', secondary:null},
          {label:'D', text:'会说话的鞋，大喊快来穿它', primary:'Ni', secondary:null},
          {label:'E', text:'不换，就要脚上的拖鞋', primary:'Si', secondary:null}
        ]},
        { id:2, weight:1.0, icon:'bag', text:'你在门口看到一个清洁工，他问你有没有要带走的垃圾，你选择', options:[
          {label:'A', text:'回家拿垃圾袋', primary:'Si', secondary:'Te'},
          {label:'B', text:'把最臭的鞋给他', primary:'Se', secondary:null},
          {label:'C', text:'自己躺进清洁车里', primary:'Ne', secondary:null},
          {label:'D', text:'别碍事', primary:'Te', secondary:null}
        ]},
        { id:3, weight:1.0, icon:'hall', text:'打发走清洁工后，你来到家门口的走廊，但是感觉和平常不一样', options:[
          {label:'A', text:'发现走廊的门都贴着一样的对联', primary:'Si', secondary:null},
          {label:'B', text:'感觉地板上有很多脚要冲出来踹你', primary:'Se', secondary:'Ni'},
          {label:'C', text:'觉得走廊没有尽头', primary:'Ni', secondary:null},
          {label:'D', text:'不管是什么异常，先回家', primary:'Si', secondary:'Te'}
        ]},
        { id:4, weight:1.0, icon:'jump', text:'街上的人都在往一个方向单脚跳跃，你会', options:[
          {label:'A', text:'一键跟随，跳跃不是罪过', primary:'Se', secondary:null},
          {label:'B', text:'一群丧尸，迅速远离', primary:'Te', secondary:'Se'},
          {label:'C', text:'我在做梦，寻找异次元入口', primary:'Ni', secondary:null},
          {label:'D', text:'这都是跟随我的教徒', primary:'Fe', secondary:'Ni'}
        ]},
        { id:5, weight:1.5, icon:'kick', text:'你有点累，原地躺下，地面长出一只脚踹你', options:[
          {label:'A', text:'来者不善，左右闪避，必要时一脚踹回去', primary:'Se', secondary:null},
          {label:'B', text:'哦吼帮我按摩一下那边对对对', primary:'Fi', secondary:'Se'},
          {label:'C', text:'强迫症犯了，给他修剪指甲', primary:'Ti', secondary:null},
          {label:'D', text:'把自己精挑细选的鞋子给他穿', primary:'Fe', secondary:null}
        ]},
        { id:6, weight:1.5, icon:'shoe', text:'有人光着脚说你偷了她的鞋子，你会', options:[
          {label:'A', text:'无端的指责，让她拿出证据', primary:'Ti', secondary:null},
          {label:'B', text:'诉说自己的脚多么适合这双鞋', primary:'Fi', secondary:null},
          {label:'C', text:'说我有脚气', primary:'Se', secondary:null},
          {label:'D', text:'看她可怜说家里有三双不穿的鞋可以送她一双', primary:'Fe', secondary:null}
        ]},
        { id:7, weight:1.0, icon:'players', text:'迎面走来了三个人，他们说这不是真实世界，你会', options:[
          {label:'A', text:'我不是真实的存在', primary:'Ni', secondary:'Fi'},
          {label:'B', text:'我也是误入这里的，一起走吧', primary:'Fe', secondary:'Ne'},
          {label:'C', text:'联系精神病院吴主任', primary:'Te', secondary:null},
          {label:'D', text:'说他们有三双鞋子丢在自己家里了', primary:'Ne', secondary:null}
        ]},
        { id:8, weight:1.5, icon:'bus', text:'你来到大巴站，你更期待', options:[
          {label:'A', text:'坐上夜宵专线，享受夜晚', primary:'Se', secondary:null},
          {label:'B', text:'离开这个世界的通道，我要前往真实', primary:'Ni', secondary:null},
          {label:'C', text:'和偶遇的乘客聊天，结交朋友', primary:'Fe', secondary:null},
          {label:'D', text:'晕车，选择相信脚的力量！', primary:'Si', secondary:null}
        ]},
        { id:9, weight:1.5, icon:'radio', text:'车站广播突然说你十分钟后会死，然后开始播放你最喜欢的音乐，你会', options:[
          {label:'A', text:'广播说的未必是真的，谁在操控广播？', primary:'Ti', secondary:null},
          {label:'B', text:'先远离周围可能的危险来源，伺机而动', primary:'Te', secondary:'Se'},
          {label:'C', text:'坐十分钟，听听自己最喜欢的歌是什么', primary:'Fi', secondary:null},
          {label:'D', text:'好好听，哼唱起来，献给世界最后一舞', primary:'Se', secondary:'Fe'}
        ]},
        { id:10, weight:1.0, icon:'clock', text:'十分钟后你并没有死去，你觉得', options:[
          {label:'A', text:'愤怒，广播耍我呢', primary:'Te', secondary:null},
          {label:'B', text:'庆幸，劫后余生', primary:'Si', secondary:null},
          {label:'C', text:'悲伤，我竟然还活着', primary:'Fi', secondary:null},
          {label:'D', text:'焦虑，也许死亡在下一秒降临', primary:'Ne', secondary:null},
          {label:'E', text:'质疑，我其实已经死了', primary:'Ti', secondary:'Ni'}
        ]},
        { id:11, weight:1.5, icon:'room', text:'回到最初的房间，你发现自己真的不是房间的主人，还穿了别人的鞋，你会', options:[

      renderQuestion();
      autoNextTimer = setTimeout(() => {
        if (currentIndex < appData.questions.length - 1) {
          currentIndex += 1;
          renderQuestion();
        } else {
          finalizeTest();
        }
      }, 170);
    }

    function finalizeTest(){
      const result = computeResult();
      latestResultCode = result.code;
      localStorage.setItem(latestResultKey, latestResultCode);
      setView('result');
    }

    prevBtn.addEventListener('click', () => {
      clearTimeout(autoNextTimer);
      if (currentIndex > 0) { currentIndex -= 1; renderQuestion(); }
    });
    nextBtn.addEventListener('click', () => {
      clearTimeout(autoNextTimer);
      if (answers[currentIndex] === null) return;
      if (currentIndex < appData.questions.length - 1) { currentIndex += 1; renderQuestion(); }
      else finalizeTest();
    });

    function renderResult(){
      if (!latestResultCode || !appData.results[latestResultCode]) {
        viewEls.result.innerHTML = `<div class="card result-card"><div class="empty-card"><p>先完成测试，这里就会出现你的结果。</p></div></div>`;
        return;
      }
      const selfCode = latestResultCode;
      const data = appData.results[selfCode];
      const pairLink = buildPairLink(selfCode);
      const compatHtml = renderCompatInline(selfCode, activeFriendCode);

      viewEls.result.innerHTML = `
        <div class="card result-card">
          <div class="result-head">
            <div>
              <div class="pill">footi</div>
              <h2 class="result-name">${data.name}</h2>
              <p class="share-line">${data.share}</p>
            </div>
            <div class="emblem-wrap">${renderBadge(selfCode)}</div>
          </div>

          <p class="desc">${data.description}</p>
          <div class="keywords">${data.keywords.map(k => `<span class="tag">${k}</span>`).join('')}</div>


          ${compatHtml}

          <div class="section pair-input">
            <div class="section-title">输入朋友的配对链接</div>
            <input id="friendLinkInput" placeholder="把朋友发来的配对链接粘贴到这里" />
            <div class="pair-actions two" style="margin-top:12px;">
              <button class="btn primary inline" id="matchBtn">开始配对</button>
              <button class="btn secondary inline" id="clearMatchBtn">清空本次配对</button>
            </div>
          </div>

          <div class="section pair-input">
            <div class="section-title">分享给朋友</div>
            <div class="pair-linkline" id="pairLinkText">${pairLink}</div>
            <div class="pair-actions two" style="margin-top:12px;">
              <button class="btn primary inline" id="copyPairBtn">复制配对链接</button>
              <button class="btn secondary inline" id="openArchiveBtn">打开配对图鉴</button>
            </div>
          </div>

          ${renderHistoryList(selfCode)}
          <div class="promo-note">${promoLine}</div>
          <div class="pair-actions" style="margin-top:14px;display:grid;">
            <button class="btn ghost inline" id="restartBtn">重新测试</button>
          </div>
        </div>
      `;

      document.getElementById('copyPairBtn').addEventListener('click', async () => {
        const ok = await copyText(pairLink);
        showToast(ok ? '链接已复制' : '复制失败');
      });
      document.getElementById('openArchiveBtn').addEventListener('click', () => setView('archive'));
      document.getElementById('restartBtn').addEventListener('click', restartTest);
      document.getElementById('matchBtn').addEventListener('click', () => {
        const code = parsePairCodeFromText(document.getElementById('friendLinkInput').value);
        if (!code || !appData.results[code]) { showToast('这个链接暂时识别不到'); return; }
        activeFriendCode = code;
        renderResult();
      });
      document.getElementById('clearMatchBtn').addEventListener('click', () => {
        activeFriendCode = incomingPairCode || null;
        renderResult();
      });
    }

    function renderCompatInline(selfCode, friendCode){
      if (!friendCode || !appData.results[friendCode]) {
        return `
          <div class="section empty-card">
            <div class="section-title" style="margin-bottom:10px;">朋友相性</div>
            <p>你的结果已经出来了。把朋友的配对链接贴进来，或把你的链接发给朋友，等对方测完以后，这里就会长出你们的相性结果。</p>
          </div>
        `;
      }
      const self = appData.results[selfCode];
      const friend = appData.results[friendCode];
      const levelKey = getCompatibilityLevel(selfCode, friendCode);
      const level = appData.compatibility[levelKey];
      addPairHistory(selfCode, friendCode, levelKey);
      return `
        <div class="section friend-compat">
          <div class="compat-band">
            <div class="level-chip">${level.name}</div>
            <div class="tiny">朋友相性已解锁</div>
          </div>
          <div class="compat-row">
            <div class="emblem-wrap">${renderBadge(selfCode)}</div>
            <div class="spark">×</div>
            <div class="emblem-wrap">${renderBadge(friendCode)}</div>
          </div>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-title">你的脚</div><div class="stat-value">${self.name}</div></div>
            <div class="stat-card"><div class="stat-title">朋友的脚</div><div class="stat-value">${friend.name}</div></div>
          </div>
          <div class="story-card">
            <strong>${level.tagline}</strong>
            <p>${level.description}</p>
          </div>
          <div class="mini-card">
            <strong>相处建议</strong>
            <p>${level.note}</p>
          </div>
        </div>
      `;
    }

    function renderHistoryList(selfCode){
      const relevant = getRelevantHistory(selfCode);
      if (!relevant.length) return '';
      return `
        <div class="section">
          <div class="section-title">最近配对记录</div>
          <div class="history-list">
            ${relevant.map(item => {
              const otherCode = item.a === selfCode ? item.b : item.a;
              const other = appData.results[otherCode];
              const level = appData.compatibility[item.levelKey];
              return `<div class="history-item"><div><div class="history-title">${other.name}</div><div class="history-meta">${formatTime(item.time)}</div></div><div class="history-badge">${level.name}</div></div>`;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderArchive(){
      if (!latestResultCode || !appData.results[latestResultCode]) {
        viewEls.archive.innerHTML = `<div class="card archive-card"><div class="empty-card"><p>先完成测试，这里会出现你的配对图鉴。</p></div></div>`;
        return;
      }
      const selfCode = latestResultCode;
      const self = appData.results[selfCode];
      const history = getRelevantHistory(selfCode);
      const unlockedMap = new Map();
      history.forEach(item => {
        const other = item.a === selfCode ? item.b : item.a;
        unlockedMap.set(other, item.levelKey);
      });
      viewEls.archive.innerHTML = `
        <div class="card archive-card">
          <div class="archive-header">
            <div>
              <div class="pill">archive</div>
              <h2 class="result-name" style="font-size:30px;margin-top:12px;">配对历史图鉴</h2>
              <p class="share-line">${self.name} 已解锁 ${unlockedMap.size} / ${allCodes.length} 种相遇</p>
            </div>
            <div class="emblem-wrap" style="width:96px;height:96px;border-radius:26px;">${renderBadge(selfCode)}</div>
          </div>
          <div class="archive-grid">
            ${allCodes.map(code => renderArchiveCell(selfCode, code, unlockedMap)).join('')}
          </div>
          <div class="pair-actions two section">
            <button class="btn primary inline" id="archiveBackBtn">返回结果</button>
            <button class="btn secondary inline" id="archiveCopyBtn">复制我的配对链接</button>
          </div>
        </div>
      `;
      document.getElementById('archiveBackBtn').addEventListener('click', () => setView('result'));
      document.getElementById('archiveCopyBtn').addEventListener('click', async () => {
        const ok = await copyText(buildPairLink(selfCode));
        showToast(ok ? '链接已复制' : '复制失败');
      });
    }

    function renderArchiveCell(selfCode, otherCode, unlockedMap){
      const unlocked = unlockedMap.has(otherCode) || otherCode === selfCode;
      if (!unlocked) {
        return `
          <div class="archive-cell locked">
            <div class="archive-top">
              <div>
                <div class="archive-foot">？？？</div>
                <div class="archive-meta">等待一次新的相遇</div>
              </div>
              <div class="archive-unknown">?</div>
            </div>
            <div class="archive-meta">未解锁</div>
          </div>
        `;
      }
      const other = appData.results[otherCode];
      const levelKey = otherCode === selfCode ? 'S' : unlockedMap.get(otherCode);
      const level = appData.compatibility[levelKey];
      return `
        <div class="archive-cell">
          <div class="archive-top">
            <div>
              <div class="archive-foot">${other.name}</div>
              <div class="archive-meta">${level.name}</div>
            </div>
            <div class="archive-badge">已解锁</div>
          </div>
          <div class="archive-meta">${level.tagline}</div>
        </div>
      `;
    }

    function restartTest(){
      clearTimeout(autoNextTimer);
      answers = Array(appData.questions.length).fill(null);
      currentIndex = 0;
      activeFriendCode = incomingPairCode || null;
      setView('test');
      renderQuestion();
    }

    function renderQuestionMark(kind){
      const common = 'stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"';
      const maps = {
        mist:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M18 18c0 5 4 9 9 9h19c5 0 8-3 8-8s-4-8-9-8H27c-5 0-9 3-9 7Z"/><path ${common} d="M14 38h36"/><path ${common} d="M20 46h24"/><path ${common} d="M26 54h12"/></svg>`,
        bag:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M24 18c0-5 3-8 8-8s8 3 8 8"/><path ${common} d="M18 22h28l-2 28H20l-2-28Z"/><path ${common} d="M25 31h14"/><circle cx="25" cy="31" r="1.7" fill="currentColor"/><circle cx="39" cy="31" r="1.7" fill="currentColor"/></svg>`,
        hall:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M16 52V14h32v38"/><path ${common} d="M24 52V22h16v30"/><path ${common} d="M16 18h32"/><path ${common} d="M24 26h16"/></svg>`,
        jump:`<svg viewBox="0 0 64 64" fill="none"><circle cx="22" cy="18" r="5" ${common}/><path ${common} d="M20 27l8 8 8-4"/><path ${common} d="M28 35l-6 13"/><path ${common} d="M29 37l12 11"/><path ${common} d="M12 49h40"/></svg>`,
        kick:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M18 34c8-8 16-8 24 0"/><path ${common} d="M42 34l10 4-4 8-16-2"/><path ${common} d="M25 22c2-5 6-8 12-8"/><path ${common} d="M16 48h20"/></svg>`,
        shoe:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M12 40c10 0 13-10 14-16l10 6c3 2 8 3 12 3h4v11H12v-4Z"/><path ${common} d="M18 44h30"/></svg>`,
        players:`<svg viewBox="0 0 64 64" fill="none"><circle cx="20" cy="20" r="5" ${common}/><circle cx="32" cy="16" r="5" ${common}/><circle cx="44" cy="20" r="5" ${common}/><path ${common} d="M14 46c2-7 5-11 10-11s8 4 10 11"/><path ${common} d="M24 46c2-7 5-11 8-11s6 4 8 11"/><path ${common} d="M34 46c2-7 5-11 10-11s8 4 10 11"/></svg>`,
        bus:`<svg viewBox="0 0 64 64" fill="none"><rect x="12" y="16" width="40" height="28" rx="8" ${common}/><path ${common} d="M18 24h28"/><path ${common} d="M18 32h12"/><path ${common} d="M38 32h8"/><circle cx="22" cy="47" r="4" ${common}/><circle cx="42" cy="47" r="4" ${common}/></svg>`,
        radio:`<svg viewBox="0 0 64 64" fill="none"><rect x="14" y="18" width="36" height="28" rx="8" ${common}/><path ${common} d="M20 30h10"/><circle cx="40" cy="32" r="5" ${common}/><path ${common} d="M18 14l10 4"/><path ${common} d="M24 50h16"/></svg>`,
        clock:`<svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="18" ${common}/><path ${common} d="M32 22v12l8 6"/><path ${common} d="M32 10v4"/><path ${common} d="M32 50v4"/></svg>`,
        room:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M16 50V18l16-8 16 8v32"/><path ${common} d="M24 50V34h16v16"/><path ${common} d="M20 24h24"/></svg>`,
        diary:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M18 14h22c4 0 6 2 6 6v30H24c-4 0-6-2-6-6V14Z"/><path ${common} d="M24 18v32"/><path ${common} d="M30 24h10"/><path ${common} d="M30 32h10"/><path ${common} d="M30 40h8"/></svg>`,
        ending:`<svg viewBox="0 0 64 64" fill="none"><path ${common} d="M16 42c8-8 24-8 32 0"/><path ${common} d="M20 30h24"/><path ${common} d="M24 18h16"/><path ${common} d="M32 18v28"/></svg>`,
        face:`<svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="18" ${common}/><circle cx="25" cy="28" r="2.6" fill="currentColor"/><circle cx="39" cy="28" r="2.6" fill="currentColor"/><path ${common} d="M23 39c3 4 7 6 9 6s6-2 9-6"/></svg>`
      };
      return maps[kind] || maps.mist;
    }

    function renderFace(kind){
      const map = {
        laugh:'😆',
        angry:'😠',
        cry:'😭',
        calm:'😐'
      };
      return `<div class="emoji-face"><span>${map[kind] || map.calm}</span></div>`;
    }

    function badgeFrame(inner){
      return `<svg viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="120" height="120" rx="34" fill="rgba(255,255,255,.05)"/>
        <circle cx="70" cy="70" r="44" fill="rgba(119,169,255,.10)"/>
        <circle cx="70" cy="70" r="49" stroke="rgba(119,169,255,.24)"/>
        ${inner}
      </svg>`;
    }

    function renderBadge(code){
      const s = 'stroke="#f5f9ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"';
      const c = '#9dc2ff';
      const badges = {
        INFJ: badgeFrame(`<path ${s} d="M70 34c4 11 11 18 22 22-11 4-18 11-22 22-4-11-11-18-22-22 11-4 18-11 22-22Z"/><path ${s} d="M51 86c8-3 14-8 19-15 5 7 11 12 19 15"/><path ${s} d="M60 99h20"/>`),
        ENFJ: badgeFrame(`<circle cx="70" cy="46" r="10" ${s}/><path ${s} d="M48 90c6-17 14-25 22-25s16 8 22 25"/><path ${s} d="M44 52c8 0 12-4 16-12 4 8 8 12 16 12 8 0 12-4 16-12"/>`),
        ENFP: badgeFrame(`<path ${s} d="M44 86c8-18 18-24 26-24 12 0 15 18 26 18"/><path ${s} d="M44 62c8-18 18-24 26-24 12 0 15 18 26 18"/><circle cx="51" cy="45" r="4" fill="${c}"/><circle cx="90" cy="92" r="4" fill="${c}"/>`),
        INFP: badgeFrame(`<path ${s} d="M54 44c4 10 2 18-6 24 13 2 22 10 26 24 4-14 13-22 26-24-8-6-10-14-6-24"/><path ${s} d="M70 44v48"/>`),
        INTJ: badgeFrame(`<path ${s} d="M70 34 96 52 86 96 54 96 44 52 70 34Z"/><path ${s} d="M58 62 70 46l12 16-12 18-12-18Z"/>`),
        ENTJ: badgeFrame(`<path ${s} d="M46 92h48"/><path ${s} d="M52 78h36"/><path ${s} d="M58 64h24"/><path ${s} d="M64 50h12"/><path ${s} d="M70 38v12"/>`),
        ENTP: badgeFrame(`<path ${s} d="M46 74c0-12 9-18 18-18s18 6 18 18-9 18-18 18-18-6-18-18Z"/><path ${s} d="M58 56c0-8 6-12 12-12s12 4 12 12"/><circle cx="58" cy="74" r="3" fill="${c}"/><circle cx="82" cy="74" r="3" fill="${c}"/>`),
        INTP: badgeFrame(`<path ${s} d="M70 34v16"/><path ${s} d="M70 90v16"/><path ${s} d="M34 70h16"/><path ${s} d="M90 70h16"/><path ${s} d="M46 46l11 11"/><path ${s} d="M83 83 94 94"/><path ${s} d="M94 46 83 57"/><path ${s} d="M46 94 57 83"/><circle cx="70" cy="70" r="12" ${s}/>`),
        ISTJ: badgeFrame(`<rect x="44" y="44" width="52" height="52" rx="14" ${s}/><path ${s} d="M70 44v52"/><path ${s} d="M44 70h52"/><circle cx="57" cy="57" r="2.5" fill="${c}"/><circle cx="83" cy="57" r="2.5" fill="${c}"/><circle cx="57" cy="83" r="2.5" fill="${c}"/><circle cx="83" cy="83" r="2.5" fill="${c}"/>`),
        ESTJ: badgeFrame(`<path ${s} d="M48 42h44v18H48z"/><path ${s} d="M54 60h32v18H54z"/><path ${s} d="M60 78h20v18H60z"/><path ${s} d="M48 42 40 50"/><path ${s} d="M92 42 100 50"/>`),
        ISFJ: badgeFrame(`<circle cx="55" cy="55" r="12" ${s}/><circle cx="85" cy="55" r="12" ${s}/><circle cx="55" cy="85" r="12" ${s}/><circle cx="85" cy="85" r="12" ${s}/><circle cx="70" cy="70" r="10" fill="rgba(119,169,255,.24)"/>`),
        ESFJ: badgeFrame(`<circle cx="70" cy="70" r="10" ${s}/><path ${s} d="M70 38c4 12 10 18 22 22-12 4-18 10-22 22-4-12-10-18-22-22 12-4 18-10 22-22Z"/><circle cx="70" cy="70" r="4" fill="${c}"/>`),
        ISTP: badgeFrame(`<path ${s} d="M70 34 92 44v20c0 16-10 26-22 34-12-8-22-18-22-34V44l22-10Z"/><path ${s} d="M59 68h22"/><path ${s} d="M63 56h14"/>`),
        ESTP: badgeFrame(`<path ${s} d="M46 92c0-18 10-30 24-30 14 0 24 12 24 30"/><path ${s} d="M50 90h44"/><path ${s} d="M70 34v26"/><path ${s} d="M60 54h20"/><circle cx="70" cy="46" r="4" fill="${c}"/>`),
        ISFP: badgeFrame(`<path ${s} d="M42 84c14-2 22-10 28-26 4 10 10 16 18 20"/><path ${s} d="M50 96c12-2 20-8 26-18"/><circle cx="90" cy="54" r="4" fill="${c}"/><circle cx="98" cy="46" r="3" fill="${c}"/>`),
        ESFP: badgeFrame(`<path ${s} d="M70 36 76 52 94 52 80 62 86 80 70 70 54 80 60 62 46 52 64 52 70 36Z"/><circle cx="94" cy="42" r="4" fill="${c}"/><circle cx="48" cy="90" r="3.5" fill="${c}"/>`)
      };
      return badges[code] || badges.INFJ;
    }

    renderQuestion();
  </script>
</body>
</html>
